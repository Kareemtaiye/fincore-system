services:
  app:
    build: .
    ports:
      - "3002:3000"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm start
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/mydb
      - REDIS_HOST=redis

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    ports:
      - "5434:5432"

  redis:
    image: redis:7
    ports:
      - "6381:6379"
